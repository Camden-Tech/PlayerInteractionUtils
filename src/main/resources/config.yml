author: "BaddCamden"

features:
  block-placement-tagging: true
  block-growth-tagging: true
  block-transform-tagging: true
  entity-spawn-tagging: true
  damage-tracking: true
  player-counters: true

storage:
  # When true, non-player block metadata is written to chunk PersistentDataContainers.
  # Set to false if your platform does not persist chunk PDC values; data will be written to plugins/PlayerInteractionsUtils/blocks/
  # on chunk unload and server shutdown instead.
  chunk-pdc-enabled: true
  # When true, non-player entity metadata (spawn owner, damage tallies) is written to the entity PDC.
  # Set to false if your platform does not persist non-player PDC; data will be written to plugins/PlayerInteractionsUtils/entities/
  # when entities leave memory (chunk unload, death) or on shutdown.
  entity-pdc-enabled: true

whitelists:
  # Only entities or tags listed here will be tagged with NBT metadata.
  # Accepts vanilla or namespaced entity ids (e.g. `minecraft:cow`, `zombie`)
  # and entity tag keys prefixed with `#` (e.g. `#minecraft:animals`).
  # Leave empty to allow all entities to be tagged.
  entity-tags: []

# Future: whitelist of NBT tags per entity could be added under `whitelists`.
